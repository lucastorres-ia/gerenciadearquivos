<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CIE Autometal System</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="geren.css">

  <!-- ✅ Firebase (VERSÃO CERTA COMPAT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- ✅ JSZIP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🏭 CIE autometal</h2>

  <button onclick="mostrarSecao('dashboard')">📊 Dashboard</button>
  <button onclick="mostrarSecao('files')">📁 Arquivos</button>
  <button onclick="mostrarFavoritos()">⭐ Favoritos</button>

  <button onclick="exportarTudo()">📦 Exportar Tudo</button>

  <!-- IMPORTAR ZIP -->
  <input type="file" id="zipInput" accept=".zip">
  <button onclick="importarZip()">📂 Importar ZIP</button>
   <button onclick="ordenarPorData()">📅 Ordenar por data</button>
  <!-- ✅ RODAPÉ -->
  <div class="rodape">
    Desenvolvido por <b>@Lucas Torres</b>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h1 id="titulo">Dashboard</h1>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="card">
      Total de Arquivos
      <span id="total">0</span>
    </div>

    <div class="card">
      Favoritos
      <span id="fav">0</span>
    </div>
  </div>

  <!-- ARQUIVOS -->
  <div id="files" style="display:none">

    <!-- BUSCA -->
    <input 
      type="text" 
      id="search" 
      placeholder="🔍 Buscar..." 
      oninput="buscarArquivo()"
    >

    <!-- DRAG & DROP -->
    <div id="dropArea">
      Arraste arquivos ou ZIP aqui 🚀
      <input type="file" id="fileInput" multiple>
    </div>

    <!-- UPLOAD -->
    <div class="upload-box">
      <input type="text" id="categoria" placeholder="Categoria">
      <button onclick="salvarArquivo()">Upload</button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      Total: <b id="totalArquivos">0</b>
    </div>

    <!-- LISTA -->
    <ul id="listaArquivos"></ul>

  </div>

</div>

</html>
